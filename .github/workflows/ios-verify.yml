name: ios-verify

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        run: xcodebuild -version

      - name: Build and Test
        run: ./scripts/ios_verify.sh
